<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>freeCodeCamp Survey Form</title>
</head>
<body>

  <h1 id="title">freeCodeCamp Survey Form</h1>

  <p id="description">
    Thank you for taking the time to help us improve the platform
  </p>

  <form id="survey-form">

    <label id="name-label" for="name">
      Name
    </label>
    <input
      id="name"
      type="text"
      placeholder="Enter your name"
      required
    >

    <label id="email-label" for="email">
      Email
    </label>
    <input
      id="email"
      type="email"
      placeholder="Enter your Email"
      required
    >

    <label id="number-label" for="number">
      Age (optional)
    </label>
    <input
      id="number"
      type="number"
      min="10"
      max="99"
      placeholder="Age"
    >

    <p>Which option best describes your current role?</p>
    <select id="dropdown">
      <option value="">Select current role</option>
      <option value="student">Student</option>
      <option value="full-time-job">Full Time Job</option>
    </select>

    <p>Would you recommend freeCodeCamp to a friend?</p>

    <label>
      <input type="radio" name="recommend" value="definitely">
      Definitely
    </label>
    <label>
      <input type="radio" name="recommend" value="maybe">
      Maybe
    </label>
    <label>
      <input type="radio" name="recommend" value="not-sure">
      Not sure
    </label>

    <p>What would you like to see improved? (Check all that apply)</p>

    <label>
      <input type="checkbox" value="front-end-projects">
      Front-end Projects
    </label>
    <label>
      <input type="checkbox" value="back-end-projects">
      Back-end Projects
    </label>
    <label>
      <input type="checkbox" value="data-visualization">
      Data Visualization
    </label>

    <p>Any comments or suggestions?</p>
    <textarea placeholder="Enter your comment here..."></textarea>

    <button id="submit" type="submit">Submit</button>

  </form>

</body>
</html>
