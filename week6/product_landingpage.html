<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="product.css">
    <title>Product Landing Page</title>
</head>
<body>
    <header id="header">
        <img id="header-img" src="https://cdn-icons-png.flaticon.com/512/3069/3069187.png" alt="Company Logo">
        <nav id="nav-bar">
            <a href="#features" class="nav-link">Features</a>
            <a href="#video-section" class="nav-link">Demo</a>
            <a href="#form-section" class="nav-link">Subscribe</a>
        </nav>
    </header>

    <main>
        <section id="features">
            <h2>Features</h2>
            <p>Our product is fast, reliable, and user-friendly.</p>
        </section>

        <section id="video-section">
            <iframe id="video" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="Product Video"></iframe>
        </section>

        <section id="form-section">
            <form id="form" action="https://www.freecodecamp.org/email-submit">
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
                <input type="submit" id="submit" value="Get Started">
            </form>
        </section>
    </main>
</body>
</html>
